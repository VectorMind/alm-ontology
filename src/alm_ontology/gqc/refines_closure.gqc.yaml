spec_version: "0.1"
name: refines_closure
title: Requirement refinement closure
status: draft
shape: closure
description: >-
  Return transitive parent requirements reached through the Requirement.refines
  relation.

parameters:
  - name: requirement
    type: string
    binds: Requirement.id
    required: true
  - name: max_depth
    type: integer
    default: 20
    minimum: 0

start:
  class: Requirement
  id_parameter: requirement

path:
  - slot: refines
    source: Requirement
    target: Requirement
    direction: forward
    min_depth: 1
    max_depth_parameter: max_depth

result:
  class: Requirement
  fields: [id, depth]
  cardinality: many
  ordering: [depth, id]

engines:
  rustworkx:
    renderer: alm_ontology.graph_rustworkx:refines_closure
  recursive_sql:
    renderer: alm_ontology.graph_duckpgq:refines_closure

fixtures:
  - id: refines-req-0112
    parameters:
      requirement: REQ-0112
      max_depth: 20
    expected:
      rows:
        - {id: REQ-0110, depth: 1}
        - {id: REQ-0002, depth: 2}
        - {id: REQ-0001, depth: 3}
