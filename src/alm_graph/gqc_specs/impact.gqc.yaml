spec_version: "0.1"
name: impact
title: Requirement impact
status: draft
shape: fixed_multi_hop_path
description: >-
  From a requirement, traverse allocation to architecture elements, descend
  composition, and return defects that affect any reached element.

parameters:
  - name: requirement
    type: string
    binds: Requirement.id
    required: true
  - name: max_depth
    type: integer
    default: 6
    minimum: 0

start:
  class: Requirement
  id_parameter: requirement

path:
  - slot: satisfied_by
    source: Requirement
    target: ArchitectureElement
    direction: forward
  - slot: composed_of
    source: ArchitectureElement
    target: ArchitectureElement
    direction: forward
    min_depth: 0
    max_depth_parameter: max_depth
  - slot: affects
    source: Defect
    target: ArchitectureElement
    direction: reverse

result:
  class: Defect
  field: id
  cardinality: many
  ordering: ascending

engines:
  rustworkx:
    renderer: alm_graph.rustworkx:impact
  recursive_sql:
    renderer: alm_graph.sql:impact_recursive
  cypher_age:
    renderer: alm_graph.age:impact

fixtures:
  - id: impact-req-0110
    parameters:
      requirement: REQ-0110
      max_depth: 6
    expected:
      defects: [DEF-0001, DEF-0004, DEF-0016]
  - id: impact-req-0001-empty
    parameters:
      requirement: REQ-0001
      max_depth: 6
    expected:
      defects: []
