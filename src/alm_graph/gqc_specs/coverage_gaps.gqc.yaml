spec_version: "0.1"
name: coverage_gaps
title: Coverage gaps
status: draft
shape: anti_join
description: >-
  Return requirements at or above a DAL threshold that have no passing verifying
  test case.

parameters:
  - name: min_dal
    type: string
    default: A
    required: false

uses:
  classes: [Requirement, TestCase]
  slots: [dal, verifies, outcome]

result:
  class: Requirement
  field: id
  cardinality: many
  ordering: ascending

engines:
  recursive_sql:
    renderer: alm_core.queries:coverage_gap_ids

fixtures:
  - id: coverage-dal-a
    parameters:
      min_dal: A
    expected:
      ids: [REQ-0112, REQ-0306]
