# Project manifest for the active ALM project.
#
# Layout under this folder (all project-specific):
#   model/alm.yaml      the ontology (LinkML)            -> .cache/projects/<name>/generated/
#   data/               authored dataset (the substrate inputs of record)
#   gqc/                *.gqc.yaml graph query contracts
#   graph-queries/      lower-layer AGE/openCypher and Postgres SQL query evidence
#   config/             project configuration (embedding profiles)
#
# Regenerable outputs for this project live under .cache/projects/vm-e1-sparrow/:
#   generated/          Pydantic types, SQL DDL, docs
#   report/             generated Markdown and HTML reports

name: VM-E1 Sparrow
description: >-
  Fictional single-seat electric light aircraft — a fully AI-generated dummy dataset
  used to exercise the ALM ontology tooling. Not for real-world use.
embedding_profile: fastembed_bge_small_en_v1_5
